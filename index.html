@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060D;--surface:#0B0B16;--surface2:#11111F;--surface3:#171729;
  --border:#202036;--border-br:#322F5C;--text:#F5F4FF;--muted:#9495BD;--dim:#5C5C82;
  --indigo:#6C5CE7;--indigo-br:#8B7BFF;--indigo-deep:#4C3FBF;--glow:rgba(139,123,255,.38);
  --green:#1FE08C;--green-soft:rgba(31,224,140,.13);--red:#FF4D7D;--red-soft:rgba(255,77,125,.13);
  --yellow:#FFC93C;--yellow-soft:rgba(255,201,60,.13);--cyan:#2BE3F0;--cyan-soft:rgba(43,227,240,.13);
  --magenta:#FF3CAC;--magenta-soft:rgba(255,60,172,.13);
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 10% -5%,rgba(139,123,255,.14),transparent 40%),radial-gradient(circle at 95% 10%,rgba(43,227,240,.10),transparent 38%),radial-gradient(circle at 50% 105%,rgba(255,60,172,.06),transparent 45%);pointer-events:none;z-index:0}
input,select,textarea{font-family:'Outfit',sans-serif;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:10px 13px;font-size:14px;width:100%;transition:all .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--indigo-br);box-shadow:0 0 0 3px var(--glow)}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--surface3);color:var(--text)}
input[type=checkbox]{width:auto;accent-color:var(--indigo-br);cursor:pointer}
.fdisp{font-family:'Sora',sans-serif;letter-spacing:-.01em} .fmono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.btn{transition:all .15s;cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;justify-content:center;-webkit-appearance:none;appearance:none}
.btn:active{transform:scale(.96)} .iconbtn:hover{background:var(--surface3)!important}
.navit:hover{background:var(--surface2)}
.rowh{transition:background .12s} .rowh:hover td{background:rgba(139,123,255,.06)!important}
.cell{background:transparent;border:none;outline:none;width:100%;padding:8px 9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center}
.cell:focus{background:var(--glow)} select.cell{cursor:pointer}
.glowtext{text-shadow:0 0 30px currentColor}
.neoncard{position:relative;border-radius:20px;background:var(--surface);border:1px solid var(--border-br);isolation:isolate}
.neoncard::before{content:'';position:absolute;inset:-1.5px;border-radius:20px;background:linear-gradient(125deg,var(--indigo-br) 0%,var(--magenta) 33%,transparent 55%,var(--cyan) 100%);opacity:.45;z-index:-1;pointer-events:none}
.neoncard>.neoninner{position:relative;background:var(--surface);border-radius:18.5px;margin:1.5px}
.s7fade{animation:s7f .35s cubic-bezier(.2,.7,.3,1) both} @keyframes s7f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.s7pop{animation:s7p .25s ease both} @keyframes s7p{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.progress-bar{height:10px;border-radius:99px;background:var(--surface3);overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}
.progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
.sectiondivider{height:1px;background:linear-gradient(90deg,transparent,var(--border-br) 15%,var(--border-br) 85%,transparent)}
::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-br);border-radius:99px} ::-webkit-scrollbar-thumb:hover{background:var(--indigo-br)}

/* ===== Responsivo para celular (adicionado) ===== */
@media (max-width:768px){
  #root>div{flex-direction:column!important}
  aside{width:100%!important;min-width:0!important;height:auto!important;position:relative!important;top:auto!important;border-right:none!important;border-bottom:1px solid var(--border-br)}
  aside>div{padding:8px 12px!important}
  aside nav{display:flex!important;flex-direction:row!important;overflow-x:auto!important;overflow-y:hidden!important;-webkit-overflow-scrolling:touch;padding:8px 10px!important;gap:4px!important}
  aside nav .navit{width:auto!important;flex:0 0 auto!important;white-space:nowrap!important;margin-bottom:0!important}
  #root>div>div>main{padding:14px!important}
  .grid-cols-2,.grid-cols-3,.grid-cols-4{grid-template-columns:1fr!important}
  .col-span-2{grid-column:span 1/span 1!important}
  .justify-between{flex-wrap:wrap!important}

</script>
<!-- PERSISTÊNCIA VIA FILE SYSTEM API -->
<script>
(function(){
'use strict';
var APP_PREFIX = document.title.indexOf('BrainOS')>-1?'bos_':document.title.indexOf('FinanceOS')>-1?'fos2_':'s7c_';
var DB_NAME = 'FilePersist_'+APP_PREFIX;
var fh = null, saveTimer = null, bar = null, statusSpan = null;

function openDB(){
  return new Promise(function(res,rej){
    var r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=function(e){e.target.result.createObjectStore('m')};
    r.onsuccess=function(e){res(e.target.result)};
    r.onerror=function(){rej()};
  });
}
function dbGet(k){
  return openDB().then(function(db){
    return new Promise(function(res){
      try{var tx=db.transaction('m','readonly');var r=tx.objectStore('m').get(k);r.onsuccess=function(){res(r.result||null)};r.onerror=function(){res(null)}}catch(e){res(null)};
    });
  }).catch(function(){return null});
}
function dbSet(k,v){
  return openDB().then(function(db){
    return new Promise(function(res){
      try{var tx=db.transaction('m','readwrite');tx.objectStore('m').put(v,k);tx.oncomplete=res;tx.onerror=res}catch(e){res()};
    });
  }).catch(function(){});
}
function gather(){
  var d={_t:new Date().toISOString()};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf(APP_PREFIX)===0){
      try{d[k.slice(APP_PREFIX.length)]=JSON.parse(localStorage.getItem(k))}
      catch(e){d[k.slice(APP_PREFIX.length)]=localStorage.getItem(k)}
    }
  }
  return d;
}
function setStatus(s,extra){
  if(!statusSpan)return;
  var t=new Date(),hh=String(t.getHours()).padStart(2,'0'),mm=String(t.getMinutes()).padStart(2,'0');
  var colors={saved:'#1FE08C',connected:'#2BE3F0',error:'#FF4D7D',none:'#FFC93C'};
  var labels={saved:'💾 Salvo '+hh+':'+mm+(extra?' · '+extra:''),connected:'📂 '+(fh?fh.name:'arquivo'),error:'⚠ Erro ao salvar',none:'⚠ Sem arquivo de dados'};
  statusSpan.textContent=labels[s]||s;
  statusSpan.style.color=colors[s]||'#FFC93C';
}
async function saveNow(){
  if(!fh)return;
  try{
    var p=await fh.queryPermission({mode:'readwrite'});
    if(p!=='granted')return;
    var w=await fh.createWritable();
    await w.write(JSON.stringify(gather(),null,2));
    await w.close();
    setStatus('saved',fh.name);
  }catch(e){setStatus('error')}
}
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNow,2500);
}
async function tryRestore(h){
  try{
    var p=await h.queryPermission({mode:'readwrite'});
    if(p==='prompt')p=await h.requestPermission({mode:'readwrite'});
    return p==='granted';
  }catch(e){return false}
}
async function loadFromFile(h){
  try{
    var p=await h.queryPermission({mode:'readwrite'});
    if(p==='prompt')p=await h.requestPermission({mode:'readwrite'});
    if(p!=='granted')return false;
    var file=await h.getFile();
    var text=await file.text();
    var data=JSON.parse(text);
    Object.entries(data).forEach(function(pair){
      var k=pair[0],v=pair[1];
      if(k.startsWith('_'))return;
      localStorage.setItem(APP_PREFIX+k,JSON.stringify(v));
    });
    return true;
  }catch(e){return false}
}
function createBar(){
  bar=document.createElement('div');
  bar.style.cssText='position:fixed;bottom:12px;right:12px;z-index:99999;display:flex;align-items:center;gap:8px;background:rgba(8,8,18,.95);border:1px solid #2A2755;border-radius:14px;padding:7px 13px;font-family:Outfit,sans-serif;font-size:12px;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,.6);';
  statusSpan=document.createElement('span');
  statusSpan.style.cssText='font-size:12px;';
  setStatus('none');
  var btn=document.createElement('button');
  btn.textContent='📂';
  btn.title='Gerenciar arquivo de dados';
  btn.style.cssText='background:rgba(99,102,241,.2);border:1px solid #6C5CE7;color:#8B7BFF;border-radius:8px;padding:3px 8px;cursor:pointer;font-size:13px;';
  btn.onclick=showMenu;
  bar.appendChild(statusSpan);
  bar.appendChild(btn);
  document.body.appendChild(bar);
}
async function showMenu(){
  if(!window.showOpenFilePicker){
    alert('Seu Chrome não suporta File System Access API.\n\nUse o botão "Exportar backup JSON" nas Configurações regularmente para não perder dados.');
    return;
  }
  var msg='ARQUIVO DE DADOS PERMANENTE\n\n'+(fh?'Arquivo atual: '+fh.name+'\n\n':'')+'Escolha uma opção:\n• OK = Abrir arquivo de dados existente\n• Cancelar = Criar novo arquivo de dados';
  var choice=window.confirm(msg);
  try{
    if(choice){
      var handles=await window.showOpenFilePicker({types:[{description:'Dados JSON',accept:{'application/json':['.json']}}]});
      var h=handles[0];
      var loaded=await loadFromFile(h);
      fh=h;
      await dbSet('fh',h);
      setStatus('connected');
      if(loaded){
        if(window.confirm('✅ Dados carregados!\n\n'+Object.keys(gather()).filter(function(k){return !k.startsWith('_')}).length+' registros encontrados.\n\nRecarregar o app agora?')){
          location.reload();
        }
      }else{
        await saveNow();
        alert('Arquivo novo criado e dados atuais salvos!');
      }
    }else{
      var appName=APP_PREFIX==='bos_'?'BrainOS':APP_PREFIX==='fos2_'?'FinanceOS':'S7VEN_CPA';
      var h2=await window.showSaveFilePicker({suggestedName:appName+'_dados.json',types:[{description:'Dados JSON',accept:{'application/json':['.json']}}]});
      fh=h2;
      await dbSet('fh',h2);
      await saveNow();
      alert('✅ Arquivo criado! Os dados serão salvos aqui automaticamente.');
    }
    startWatch();
  }catch(e){}
}
var _lastHash='';
function startWatch(){
  setInterval(function(){
    var cur=JSON.stringify(gather());
    if(cur!==_lastHash){_lastHash=cur;scheduleSave()}
  },3000);
  window.addEventListener('beforeunload',function(){saveNow()});
}
async function init(){
  await new Promise(function(res){setTimeout(res,800)});
  createBar();
  var saved=await dbGet('fh');
  if(saved){
    var ok=await tryRestore(saved);
    if(ok){fh=saved;setStatus('connected');startWatch();await saveNow();}
    else{
      var reBtn=document.createElement('button');
      reBtn.textContent='🔓 Reconectar arquivo';
      reBtn.style.cssText='background:rgba(212,175,55,.2);border:1px solid #D4AF37;color:#F5C518;border-radius:8px;padding:3px 9px;cursor:pointer;font-size:11px;';
      reBtn.onclick=async function(){
        var ok2=await tryRestore(saved);
        if(ok2){fh=saved;setStatus('connected');reBtn.remove();startWatch();await saveNow();}
      };
      bar.insertBefore(reBtn,bar.lastChild);
    }
  }
}
init();
})();
</script>
</body>
</html>
